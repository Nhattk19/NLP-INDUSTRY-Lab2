seed: 42
data:
  train_csv: sample_data/train.csv
  val_csv: sample_data/val.csv
  test_csv: sample_data/test.csv
  text_column: text
  label_column: category
model:
  base_model: unsloth/Qwen2.5-0.5B-Instruct-bnb-4bit
  max_seq_length: 256
  load_in_4bit: true
  lora_r: 16
  lora_alpha: 16
  lora_dropout: 0.0
  bias: none
  use_gradient_checkpointing: unsloth
  use_rslora: false
  packing: false
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
training:
  output_dir: outputs/intent_qwen05b
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  num_train_epochs: 2
  warmup_ratio: 0.03
  weight_decay: 0.01
  logging_steps: 20
  evaluation_strategy: epoch
  save_strategy: epoch
  optim: adamw_8bit
  lr_scheduler_type: linear
  max_grad_norm: 1.0
  report_to: none
evaluation:
  enabled: true
  max_new_tokens: 12
  max_samples: 500
prompt:
  system: You are a banking intent classifier. Return exactly one BANKING77 label
    and nothing else.
  input_prefix: 'Message:'
  output_prefix: 'Label:'
